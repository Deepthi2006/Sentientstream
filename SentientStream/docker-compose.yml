version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentistream_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentistream
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2020"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentistream"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
